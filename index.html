<!doctype html>
<html>
  <head>
    <title>Baddies of Flight</title>
    <meta name="description" content="A catalog of iconic commercial aircrafts that have served humanity" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Who Runs The World? Planes! </h1>
      <p class="subtitle">Welcome to THE catalog of the most beloved aircraft in aviation history</p>
    </header>

    <div class="controls">
  <p class="controls-label">Search or filter the catalog below</p>
  <input type="text" id="search-bar" placeholder="Search by name or manufacturer..." />
  <p class="controls-label">Select a category to further refine aircraft to your specific liking :D</p>
  <div class="filter-buttons">
    <button onclick="filterByCategory('All')">All</button>
    <button onclick="filterByCategory('Giants')">Giants</button>
    <button onclick="filterByCategory('Workhorses')">Workhorses</button>
    <button onclick="filterByCategory('Legends')">Legends</button>
    <button onclick="filterByCategory('Ghosts')">Ghosts</button>
  </div>
  </div>

    <div id="card-container"></div>

    <footer class="footer">
      <p>Built by plane spotter Frankilicious, data sourced with love from Wikipedia</p>
    </footer>

    <script type="text/javascript" src="scripts.js"></script>
  </body>
</html>
